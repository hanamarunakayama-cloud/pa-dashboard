<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PA個人別出勤推移ダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Meiryo","Yu Gothic",sans-serif;background:#f5f5f3;color:#1a1a18;font-size:14px}
.header{background:#fff;border-bottom:1px solid #e0dfd8;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:18px;font-weight:600;color:#1a1a18}
.header-sub{font-size:13px;color:#888;margin-top:2px}
.header-badge{font-size:11px;background:#f0f0ea;padding:4px 10px;border-radius:12px;color:#555}
.main{padding:16px 20px;max-width:1400px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
@media(max-width:800px){.kpis{grid-template-columns:repeat(3,1fr)}}
.kpi{background:#fff;border-radius:8px;padding:12px 14px;border:1px solid #e8e8e0}
.kpi-lbl{font-size:12px;color:#888;margin-bottom:4px}
.kpi-val{font-size:26px;font-weight:700}
.kpi-val.red{color:#d9534f}.kpi-val.ora{color:#c0622a}.kpi-val.amb{color:#9a6800}.kpi-val.grn{color:#2e7d50}
.ctrl{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center;background:#fff;padding:10px 14px;border-radius:8px;border:1px solid #e8e8e0}
select,input[type=text]{font-size:13px;padding:6px 10px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#1a1a18;height:34px}
input[type=file]{font-size:12px;color:#555}
.btn{font-size:12px;padding:5px 14px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;color:#1a1a18;height:30px;white-space:nowrap}
.btn:hover{background:#f5f5f3}
.btn.primary{background:#1a5276;color:#fff;border-color:#1a5276}
.btn.primary:hover{background:#154360}
.btn:disabled{opacity:.4;cursor:default}
.up-box{background:#fff;border-radius:8px;padding:14px 16px;margin-bottom:14px;border:1px solid #e8e8e0}
.tbl-wrap{overflow-x:auto;background:#fff;border-radius:8px;border:1px solid #e8e8e0}
table{width:100%;border-collapse:collapse}
th{font-size:13px;font-weight:700;color:#444;padding:11px 14px;border-bottom:2px solid #c8c8c0;text-align:left;white-space:nowrap;background:#ececea}
td{font-size:14px;padding:10px 14px;border-bottom:1px solid #ebebea;vertical-align:middle}
tr:hover td{background:#fafaf8}
.badge{display:inline-block;font-size:12px;padding:4px 10px;border-radius:10px;font-weight:700;white-space:nowrap}
.b0{background:#fde8e8;color:#922b21}
.b1{background:#fdebd0;color:#784212}
.b2{background:#fef9e7;color:#7d6608}
.b3{background:#e9f7ef;color:#1e8449}
.b4{background:#eaf0fb;color:#1a5276}
.b5{background:#f4f4f0;color:#666}
.v0{color:#d9534f;font-weight:700}
.vnull{color:#bbb}
.mini-bars{display:flex;align-items:flex-end;gap:3px;height:22px}
.rdot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#d9534f;margin-right:4px;vertical-align:middle}
.pg{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:12px;color:#888;background:#fff;border-top:1px solid #e8e8e0;border-radius:0 0 8px 8px}
.am-filter-bar{background:#1a5276;color:#fff;padding:8px 20px;font-size:12px;display:none}
.am-filter-bar b{font-size:13px}
.section-title{font-size:11px;font-weight:600;color:#888;margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase}
.upload-msg{margin-top:8px;font-size:12px;padding:6px 10px;border-radius:6px}
.upload-msg.ok{background:#e9f7ef;color:#1e8449}
.upload-msg.err{background:#fde8e8;color:#922b21}
.upload-msg.info{background:#f4f4f0;color:#555}

</head>
<body>

<div class="header">
  <div>
    <div class="header-title">PA個人別出勤推移ダッシュボード</div>

  </div>
  <div style="display:flex;gap:8px;align-items:center">

    <button class="btn" id="toggleUpBtn">＋ 月データ追加</button>
  </div>
</div>

<div id="amBar" class="am-filter-bar"></div>

<div class="main">

      </div>
      <div id="uploadMsg"></div>

    </div>
  </div>

  <div class="kpis" id="kpiRow"></div>

  <div class="ctrl">
    <select id="sf"></select>
    <select id="tf">
      <option value="">全ステータス</option>
      <option value="zero_persistent">● 連続0回</option>
      <option value="zero_recent">● 直近0回</option>
      <option value="worsening">● 悪化中</option>
      <option value="improving">● 改善中</option>
      <option value="mixed">● 増減あり</option>
      <option value="low">● 低頻度継続</option>

    <input type="text" id="ns" placeholder="名前で検索…" style="min-width:130px">
    <select id="sb">
      <option value="priority">優先度順</option>
      <option value="store">店舗順</option>
      <option value="name">名前順</option>
      <option value="last_asc">直近月 少ない順</option>
    </select>
    <span id="countInfo" style="font-size:11px;color:#aaa;margin-left:4px"></span>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead id="tblHead"></thead>
      <tbody id="tblBody"></tbody>
    </table>
    <div class="pg">
      <button class="btn" id="prevBtn">← 前</button>
      <span id="pageInfo">1 / 1</span>
      <button class="btn" id="nextBtn">次 →</button>
      <span id="pgCount" style="margin-left:8px;font-size:11px;color:#aaa"></span>
    </div>
  </div>
</div>

const LS_KEY = 'pa_dashboard_v1';
const PER = 30;

let state = {
  monthData: null,
  storeFilter: '',
  trendFilter: '',
  nameSearch: '',
  sortBy: 'priority',
  page: 1,

// URLパラメーター解析
function getUrlParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    store: p.get('store') || '',
    am: p.get('am') || '',
    readonly: p.get('readonly') === '1',
  };
}

// localStorage読み書き
function saveData(data) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
}
function loadData() {
  try {
    const s = localStorage.getItem(LS_KEY);
    return s ? JSON.parse(s) : null;
  } catch(e) { return null; }
}

function mLabel(m) { return parseInt(m.slice(5)) + '月'; }

function classifyTrend(pMonths, months) {
  const avail = months.map(m => pMonths[m] ?? null).filter(v => v !== null);
  if (avail.length < 2) return 'low';
  const last3 = avail.slice(-3);
  const n = last3.length;
  const allZ = last3.every(v => v === 0);
  const lastZ = last3[n-1] === 0;
  const prev2Z = n >= 2 && last3[n-2] === 0;
  if (allZ) return 'zero_persistent';
  if (lastZ && prev2Z) return 'zero_persistent';
  if (lastZ) return 'zero_recent';
  const isInc = last3.every((v,i) => i===0 || v >= last3[i-1]);
  const isDec = last3.every((v,i) => i===0 || v <= last3[i-1]);
  if (isInc && last3[n-1] > last3[0]) return 'improving';
  if (isDec && last3[n-1] < last3[0]) return 'worsening';
  return 'mixed';
}

function buildPersons(data) {
  const months = Object.keys(data).sort();
  const map = {};
  for (const m of months) {
    for (const [si, name, days, retire] of (data[m] || [])) {
      const k = `${si}|${name}`;
      if (!map[k]) map[k] = {store: STORE_LIST[si], name, months: {}, retire: ''};
      map[k].months[m] = days;
      if (retire) map[k].retire = retire;
    }
  }
  return Object.values(map).filter(p => Object.keys(p.months).length >= 2);
}

function init() {
  const params = getUrlParams();

  // URLパラメーターによるAM・店舗フィルター設定
  if (params.am && AM_MAP[params.am]) {
    state.amFilter = params.am;
  }
  if (params.store) {
    state.storeFilter = params.store;
  }

  // AMフィルターバー表示
  if (state.amFilter) {
    const bar = document.getElementById('amBar');
    bar.style.display = 'block';
    bar.innerHTML = `<b>${state.amFilter} AM</b> — 担当エリアのデータを表示中`;
  }

  // データ読み込み
  let data = loadData();
  if (!data) {
    data = {};
    for (const [m, recs] of Object.entries(BS.months)) {
      data[m] = recs;
    }
    saveData(data);
  } else {
    // ブートストラップにある月で欠けているものを補完
    for (const [m, recs] of Object.entries(BS.months)) {
      if (!data[m]) { data[m] = recs; }
    }
    saveData(data);
  }
  state.monthData = data;

  // 読み取り専用モードの場合はアップロードボタンを非表示
  if (params.readonly) {
    document.getElementById('toggleUpBtn').style.display = 'none';
  }

  setupEventListeners();
  render();
}

function setupEventListeners() {
  document.getElementById('toggleUpBtn').onclick = () => {
    state.showUpload = !state.showUpload;
    document.getElementById('upPanel').style.display = state.showUpload ? 'block' : 'none';
    document.getElementById('toggleUpBtn').textContent = state.showUpload ? '▲ 閉じる' : '＋ 月データ追加';
  };
  document.getElementById('fileInput').onchange = e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
    e.target.value = '';
  };
  document.getElementById('sf').onchange = e => { state.storeFilter = e.target.value; state.page = 1; render(); };
  document.getElementById('tf').onchange = e => { state.trendFilter = e.target.value; state.page = 1; render(); };
  document.getElementById('ns').oninput = e => { state.nameSearch = e.target.value; state.page = 1; render(); };
  document.getElementById('sb').onchange = e => { state.sortBy = e.target.value; state.page = 1; render(); };
  document.getElementById('prevBtn').onclick = () => { state.page = Math.max(1, state.page - 1); render(); };
  document.getElementById('nextBtn').onclick = () => { state.page++; render(); };
}

async function handleFile(file) {
  state.uploading = true;
  const msgEl = document.getElementById('uploadMsg');
  msgEl.className = 'upload-msg info'; msgEl.textContent = '解析中...';
  document.getElementById('uploadSpinner').style.display = 'inline';

  try {
    const match = file.name.match(/2026_0?(\d+)/i);
    if (!match) {
      msgEl.className = 'upload-msg err';
      msgEl.textContent = '❌ ファイル名から月を検出できません。「PA月労働時間分布2026_X.xlsx」形式にしてください。';
      document.getElementById('uploadSpinner').style.display = 'none';
      return;
    }
    const mn = parseInt(match[1]);
    const mk = `2026-${String(mn).padStart(2, '0')}`;
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {type: 'array', cellDates: true});
    const recs = [];
    for (const [sn, si] of Object.entries(SHEET_KEYS)) {
      const ws = wb.Sheets[sn];
      if (!ws) continue;
      const rows = XLSX.utils.sheet_to_json(ws, {header: 1, defval: null});
      for (let i = 2; i < rows.length; i++) {
        const row = rows[i]; if (!row) continue;
        const name = row[2]; const days = row[5];
        if (!name || typeof name !== 'string' || !name.trim()) continue;
        const d = typeof days === 'number' ? Math.round(days) : parseInt(days);
        if (isNaN(d) || d < 0 || d > 31) continue;
        let ret = '';
        const rv = row[7];
        if (rv instanceof Date) { const y = rv.getFullYear(); if (y >= 2020 && y <= 2030) ret = rv.toISOString().slice(0, 10); }
        else if (typeof rv === 'string' && /\d{4}-\d{2}-\d{2}/.test(rv)) ret = rv.slice(0, 10);
        recs.push([si, name.trim(), d, ret]);
      }
    }
    if (recs.length === 0) {
      msgEl.className = 'upload-msg err';
      msgEl.textContent = '❌ データを読み取れませんでした。ファイル形式を確認してください。';
      document.getElementById('uploadSpinner').style.display = 'none';
      return;
    }
    state.monthData = {...state.monthData, [mk]: recs};
    saveData(state.monthData);
    msgEl.className = 'upload-msg ok';
    msgEl.textContent = `✅ ${mn}月データを登録しました（${recs.length}名）`;
    state.page = 1;
    render();
  } catch(e) {
    msgEl.className = 'upload-msg err';
    msgEl.textContent = '❌ エラー: ' + e.message;
  }
  document.getElementById('uploadSpinner').style.display = 'none';
}

function render() {
  const {monthData, storeFilter, trendFilter, nameSearch, sortBy, page, amFilter} = state;
  const months = Object.keys(monthData).sort();
  let allP = buildPersons(monthData);

  // AMフィルター適用（URLパラメーター）
  if (amFilter && AM_MAP[amFilter] && AM_MAP[amFilter].length > 0) {
    allP = allP.filter(p => AM_MAP[amFilter].includes(p.store));
  }

  const stores = [...new Set(allP.map(p => p.store))].sort((a,b) => a.localeCompare(b, 'ja'));

  // ストアセレクト更新
  const sf = document.getElementById('sf');
  const cur = sf.value;
  sf.innerHTML = '<option value="">全店舗</option>' + stores.map(s =>
    `<option value="${s}"${storeFilter===s?' selected':''}>${s}</option>`
  ).join('');

  // フィルター＋分類
  let filtered = allP.map(p => ({...p, trend: classifyTrend(p.months, months)}));
  if (storeFilter) filtered = filtered.filter(p => p.store === storeFilter);
  if (trendFilter) filtered = filtered.filter(p => p.trend === trendFilter);
  if (nameSearch) filtered = filtered.filter(p => p.name.includes(nameSearch));

  const PRI = {zero_persistent:0,zero_recent:1,worsening:2,mixed:4,improving:5,low:6};
  if (sortBy==='priority') filtered.sort((a,b) => (PRI[a.trend]??9)-(PRI[b.trend]??9));
  else if (sortBy==='store') filtered.sort((a,b) => a.store.localeCompare(b.store,'ja'));
  else if (sortBy==='name') filtered.sort((a,b) => a.name.localeCompare(b.name,'ja'));
  else { const lm=months[months.length-1]; filtered.sort((a,b)=>(a.months[lm]??99)-(b.months[lm]??99)); }

  const allTrends = allP.map(p => classifyTrend(p.months, months));
  const kpiData = [
    {lbl:'追跡対象', val:allP.length, c:''},
    {lbl:'連続0回', val:allTrends.filter(t=>t==='zero_persistent').length, c:'red'},
    {lbl:'直近0回', val:allTrends.filter(t=>t==='zero_recent').length, c:'ora'},
    {lbl:'悪化中', val:allTrends.filter(t=>t==='worsening').length, c:'amb'},
    {lbl:'改善中', val:allTrends.filter(t=>t==='improving').length, c:'grn'},
  ];
  document.getElementById('kpiRow').innerHTML = kpiData.map(k =>
    `<div class="kpi"><div class="kpi-lbl">${k.lbl}</div><div class="kpi-val ${k.c}">${k.val}</div></div>`
  ).join('');

  const tp = Math.max(1, Math.ceil(filtered.length / PER));
  const cp = Math.min(page, tp);
  state.page = cp;
  const slice = filtered.slice((cp-1)*PER, cp*PER);

  // テーブルヘッダー
  document.getElementById('tblHead').innerHTML = `<tr>
    <th>ステータス</th><th>店舗</th><th>名前</th>
    ${months.map(m=>`<th style="text-align:center">${mLabel(m)}</th>`).join('')}
    <th style="min-width:90px">推移</th><th>退職日</th>
  </tr>`;

  // テーブルボディ
  document.getElementById('tblBody').innerHTML = slice.map(p => {
    const tm = TREND_META[p.trend] || TREND_META.low;
    const mCells = months.map(m => {
      const v = p.months[m] ?? null;
      return `<td style="text-align:center" class="${v===0?'v0':v==null?'vnull':''}">${v==null?'—':v}</td>`;
    }).join('');
    const bars = months.map(m => {
      const v = p.months[m] ?? null;
      const h = v==null?0:Math.round((v/7)*26)+3;
      const c = v==null?'#e0dfd8':BAR_C[v];
      return `<div style="width:13px;height:${h}px;background:${c};border-radius:2px 2px 0 0"></div>`;
    }).join('');
    return `<tr>
      <td><span class="badge ${tm.cls}">${tm.lbl}</span></td>
      <td style="font-size:13px;color:#555;white-space:nowrap">${p.store}</td>
      <td style="white-space:nowrap">${p.retire?'<span class="rdot"></span>':''}${p.name}</td>
      ${mCells}
      <td><div class="mini-bars" style="display:flex;align-items:flex-end;gap:4px;height:30px">${bars}</div></td>
      <td style="font-size:13px;color:${p.retire?'#d9534f':'#bbb'}">${p.retire||'—'}</td>
    </tr>`;
  }).join('');

  document.getElementById('pageInfo').textContent = `${cp} / ${tp}`;
  document.getElementById('prevBtn').disabled = cp <= 1;
  document.getElementById('nextBtn').disabled = cp >= tp;
  document.getElementById('countInfo').textContent = `${filtered.length}名`;
  document.getElementById('pgCount').textContent = `${filtered.length}名中 ${(cp-1)*PER+1}〜${Math.min(cp*PER,filtered.length)}件`;
  document.getElementById('headerSub').textContent = `${months.map(mLabel).join('・')} — ${allP.length}名追跡`;
  document.getElementById('registeredMonths').textContent = '登録済み月: ' + months.map(mLabel).join(' / ');
}

init();
</script>
</body>
</html>
